name: Build Android APK

on:
  push:
    branches:
      - claude/kind-sagan-rKUPh
      - claude/slots-balance-bugs-8h5etm
    paths:
      - '**.tsx'
      - '**.ts'
      - 'index.html'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://pwwatepcfphaeeitrenm.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3d2F0ZXBjZnBoYWVlaXRyZW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjg5NzUsImV4cCI6MjA5Nzk0NDk3NX0.0i76oTYX-vKe8r2X9rMYDULowyVdmiq3rR4VJx-MQdg

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # ── Debug APK (sideloading) ──────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Copy debug APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk casinowow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: casinowow-apk
          path: casinowow.apk

      # ── Signed release AAB (Google Play Store) ───────────────────────────────
      - name: Decode release keystore
        id: keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "${{ github.workspace }}/release.jks"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release AAB
        if: steps.keystore.outputs.exists == 'true'
        run: ./gradlew bundleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.${{ github.run_number }}"

      - name: Copy release AAB
        if: steps.keystore.outputs.exists == 'true'
        run: cp android/app/build/outputs/bundle/release/app-release.aab casinowow.aab

      - name: Upload AAB artifact
        if: steps.keystore.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: casinowow-aab
          path: casinowow.aab

      # ── Publish to GitHub Releases ───────────────────────────────────────────
      - name: Publish APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: CasinoWow Android (latest)
          body: |
            Latest CasinoWow build from `${{ github.sha }}`.

            - **`casinowow.apk`** — debug APK for sideloading (enable "Install from unknown sources" on your phone)
            - **`casinowow.aab`** — signed release bundle for Google Play Store _(present only when signing secrets are configured)_
          files: casinowow.apk
          prerelease: false
          make_latest: true

      - name: Add AAB to Releases
        if: steps.keystore.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          files: casinowow.aab
